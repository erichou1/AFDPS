# FWI diffusion prior (EDM). Copied from navier_stokes/configs/pretrain/fwi.yaml so the
# fallback net can be instantiated when the checkpoint is a plain state_dict (.pt). Only the
# `model:` block is used at inference time (the data/loss/train blocks are for pretraining).
data:
  _target_: training.dataset.LMDBData
  root: ../data/fwi-train
  resolution: 128
  raw_resolution: 70
  std: 500.0
  mean: 3000.0

model:
  _target_: models.precond.EDMPrecond
  model_type: DhariwalUNet
  img_resolution: 128
  img_channels: 1
  label_dim: 0
  model_channels: 128
  channel_mult: [1, 1, 1, 2, 2]
  attn_resolutions: [16]
  num_blocks: 1
  dropout: 0.0

loss:
  _target_: training.loss.EDMLoss

train:
  lr: 0.0001
  batch_size: 256
  num_steps: 100_000
  warmup_steps: 500
  ema_decay: 0.9999
  grad_clip: 0.0
